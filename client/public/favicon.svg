<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34" width="34" height="34">
  <!--
    Summly favicon — the same 5-bar waveform mark used in the app's <Logo />
    component (src/components/Logo.jsx), on a dark chip so it reads clearly
    in a browser tab at 16px. Previously this file was an unrelated leftover
    default icon (purple/violet abstract shape) that didn't match the app's
    brand at all — this replaces it with the real mark.
  -->
  <rect width="34" height="34" rx="9" fill="#0A0A0B"/>
  <rect x="3"  y="21" width="4" height="6"  rx="2" fill="#10b981"/>
  <rect x="9"  y="13" width="4" height="14" rx="2" fill="#10b981"/>
  <rect x="15" y="5"  width="4" height="22" rx="2" fill="#FAFAFA"/>
  <rect x="21" y="17" width="4" height="10" rx="2" fill="#10b981"/>
  <rect x="27" y="23" width="4" height="4"  rx="2" fill="#F0B558"/>
</svg>

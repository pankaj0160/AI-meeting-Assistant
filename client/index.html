<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summly — Meeting Intelligence</title>

    <!--
      Font loading in <head> = loaded before first paint.
      No FOUT (flash of unstyled text).

      Before: Layout.jsx injected a <style> tag via JavaScript on mount.
      That means fonts were requested AFTER the JS bundle ran —
      causing a visible flash where the wrong font showed briefly.

      Inter is the primary font — clean, highly legible, great at all sizes.
      Works perfectly for both display text and body copy.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!--
      Display + data faces added for the typography pass.
      Fraunces (variable, optical-size axis) = page titles, dashboard big
      numbers, marketing hero. Its opsz axis lets headlines feel sharp at
      large sizes without needing a separate "display" weight.
      IBM Plex Mono = transcript timestamps, meeting metadata, tags — the
      one deliberate brand-specific choice, since meetings ARE timestamped
      data. Using it consistently ties every screen back to that material.
      Inter (above) remains the body/UI workhorse — unchanged.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!--
      Prevent flash of white background before React mounts.
      Reads the saved theme from localStorage immediately — before any JS runs.
      Without this: dark mode users see a white flash on every page load.
    -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('summly_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          if (theme === 'dark') {
            document.documentElement.style.background = '#0A0A0B'; /* brand v2 */
          } else {
            document.documentElement.style.background = '#F8F8F7'; /* brand v2 */
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

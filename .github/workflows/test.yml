name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install \
            fastapi==0.136.3 \
            uvicorn==0.48.0 \
            python-multipart==0.0.29 \
            pydantic==2.13.4 \
            pydantic-settings==2.14.1 \
            python-dotenv==1.2.2 \
            python-jose==3.5.0 \
            passlib==1.7.4 \
            bcrypt==4.0.1 \
            groq==0.37.1 \
            instructor==1.8.3 \
            openai==1.86.0 \
            langfuse==2.59.3 \
            httpx==0.28.1 \
            psycopg2-binary==2.9.10 \
            slowapi==0.1.9 \
            structlog==24.4.0 \
            pytest==8.3.5 \
            pytest-asyncio

      - name: Run pytest
        run: python -m pytest server/tests/ -v
        env:
          GROQ_API_KEY: "fake-key-for-testing"
          LANGFUSE_PUBLIC_KEY: "fake-key-for-testing"
          LANGFUSE_SECRET_KEY: "fake-key-for-testing"
          LANGFUSE_HOST: "https://cloud.langfuse.com"
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
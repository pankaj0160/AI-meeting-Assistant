name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"                    # ← add this line

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest server/tests/ -v
        env:
          GROQ_API_KEY: "fake-key-for-testing"
          LANGFUSE_PUBLIC_KEY: "fake-key-for-testing"
          LANGFUSE_SECRET_KEY: "fake-key-for-testing"
          LANGFUSE_HOST: "https://cloud.langfuse.com"